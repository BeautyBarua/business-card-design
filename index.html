<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Web & Design Studio - Business Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="card-wrapper">

    <!-- Front Side -->
    <section class="business-card front">
      <img src="images/B_logo.png" alt="Beauty Web & Design Studio Logo" class="logo" />
    </section>

    <!-- Back Side -->
    <section class="business-card back">
      <div class="left">
        <h1>Beauty Barua</h1>
        <h2>Web Developer & Graphic Designer</h2>

        <p class="studio">Beauty Web & Design Studio</p>

        <p class="services">
          Websites • Logos • Business Cards • Posters • Social Media Design
        </p>

        <div class="contact">
          <p>📍 Gatineau / Ottawa</p>
          <p>📧 beubarua14@gmail.com</p>
          <p>📞 514-231-6096</p>
        </div>
      </div>

      <div class="right">
        <img src="images/facebook_qr.png" alt="Facebook QR Code" class="qr" />
        <p>Scan to visit my Facebook page</p>
      </div>
    </section>

  </main>

</body>
</html>
